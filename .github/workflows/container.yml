name: Test and publish server container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/kikots/battlespades

jobs:
  test:
    name: Source and container contract
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile native server
        run: python setup.py build_ext --inplace

      - name: Run complete test suite
        run: python -m pytest tests -q

      - name: Validate generated container configuration
        env:
          BATTLESPADES_DATA_DIR: ${{ runner.temp }}/battlespades-check
        run: python scripts/container_entrypoint.py --check

  publish:
    name: Publish immutable GHCR image
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read server version
        id: version
        shell: bash
        run: echo "value=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.value }}

      - name: Build and publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            IMAGE_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  deploy:
    name: Roll out UDP game node
    needs: publish
    if: >-
      github.ref == 'refs/heads/main' &&
      vars.AUTO_DEPLOY_GAME_NODE == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: game-production

    steps:
      - name: Configure pinned SSH host
        env:
          GAME_NODE_KNOWN_HOSTS: ${{ secrets.GAME_NODE_KNOWN_HOSTS }}
          GAME_NODE_SSH_KEY: ${{ secrets.GAME_NODE_SSH_KEY }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$GAME_NODE_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          printf '%s\n' "$GAME_NODE_SSH_KEY" > "$HOME/.ssh/game-node"
          chmod 600 "$HOME/.ssh/known_hosts" "$HOME/.ssh/game-node"

      - name: Deploy the tested immutable image one server at a time
        env:
          GAME_NODE_HOST: ${{ secrets.GAME_NODE_HOST }}
          GAME_NODE_USER: ${{ secrets.GAME_NODE_USER }}
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          remote="cd /opt/BattleSpades && git fetch origin '$GITHUB_SHA' && git checkout --detach '$GITHUB_SHA' && ./deploy/rollout.sh 'sha-$short_sha'"
          ssh -i "$HOME/.ssh/game-node" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$GAME_NODE_USER@$GAME_NODE_HOST" \
            "$remote"
