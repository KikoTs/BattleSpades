RULE_ENABLE_PREFABS = true
RULE_ONE_HIT_KILL = false
RULE_ENABLE_GRAVESTONES = true
RULE_ENABLE_CORPSE_EXPLOSION = true
RULE_ENABLE_SNIPER_BEAM = true
RULE_ENABLE_DEATH_CAM = true
RULE_ENABLE_MINI_MAP = true
RULE_ENABLE_SPECTATORS = true
RULE_ENABLE_FALL_ON_WATER_DAMAGE = true
RULE_RESPAWN_TIMES = 5                 # 0..60 in five-second steps
RULE_BLOCK_HEALTH = "100%"             # 50%, 100%, 200%
RULE_WEAPON_DAMAGE = "100%"            # 50%, 100%, 200%
RULE_SPAWN_PROTECTION_TIME = "OFF"     # OFF, 1, 2, 3 seconds
RULE_CHARACTER_BLOCK_WALLETS = "100%" # 50%, 100%, 200%
RULE_CHARACTER_SPEED = "100%"          # 50%, 100%, 150%, 200%
RULE_POINTS_FROM_TEABAGGING = false
