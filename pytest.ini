[pytest]
# Only the canonical suite belongs to this checkout.  Validation artifacts in
# tmp/ and nested agent worktrees contain copied test modules; recursively
# importing those copies caused the apparent all-suite collection hang and
# polluted module-level compatibility stubs such as ``toml``.
testpaths = tests
python_files = test_*.py
norecursedirs =
    .git
    .worktrees
    build
    dist
    logs
    release
    tmp
    ugc-projects
    vendor
